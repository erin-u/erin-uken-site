<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Erin Uken Admin</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { padding: 2rem; }
    .admin-card { max-width: 900px; margin: 0 auto; background: white; border: 1px solid #dfe6f2; border-radius: 18px; padding: 1.5rem; box-shadow: 0 16px 40px rgba(23,32,51,.08); }
    .admin-grid { display: grid; gap: 1rem; }
    textarea, input { width: 100%; padding: .7rem; border-radius: 10px; border: 1px solid #dfe6f2; }
    .muted { color: #5d6b86; }
  </style>
</head>
<body>
  <div class="admin-card">
    <h1>Erin Uken Admin</h1>
    <p class="muted">A lightweight admin starter for updating home content, pages, blog posts, and portfolio items.</p>
    <div class="admin-grid">
      <div>
        <label for="pageTitle">Page title</label>
        <input id="pageTitle" value="Erin Uken | AI • Real Estate • Storytelling" />
      </div>
      <div>
        <label for="heroHeadline">Hero headline</label>
        <input id="heroHeadline" value="Erin Uken helps people and businesses move with clarity." />
      </div>
      <div>
        <label for="heroText">Hero text</label>
        <textarea id="heroText" rows="4">Erin blends AI consulting, real estate guidance, and thoughtful storytelling into one clear digital home.</textarea>
      </div>
      <div>
        <label for="aboutText">About section text</label>
        <textarea id="aboutText" rows="5">Erin Uken is a strategist, communicator, and guide who helps people and businesses move forward with clarity.</textarea>
      </div>
      <div>
        <label for="featuredTestimonial">Featured testimonial quote</label>
        <textarea id="featuredTestimonial" rows="3">Erin brings clarity, warmth, and strategy to every conversation. She makes complex ideas feel easy to act on and meaningful to pursue.</textarea>
      </div>
      <div>
        <label for="featuredAuthor">Featured testimonial author</label>
        <input id="featuredAuthor" value="Client feedback" />
      </div>
      <div>
        <label for="testimonialOne">Testimonial 1</label>
        <textarea id="testimonialOne" rows="3">Thoughtful, organized, and deeply intentional. Her work helps people feel seen and supported.</textarea>
      </div>
      <div>
        <label for="testimonialOneAuthor">Testimonial 1 author</label>
        <input id="testimonialOneAuthor" value="Professional collaboration" />
      </div>
      <div>
        <label for="testimonialTwo">Testimonial 2</label>
        <textarea id="testimonialTwo" rows="3">A rare mix of heart and execution. The experience feels polished, personal, and grounded in trust.</textarea>
      </div>
      <div>
        <label for="testimonialTwoAuthor">Testimonial 2 author</label>
        <input id="testimonialTwoAuthor" value="Community connection" />
      </div>
      <button class="primary-btn" onclick="saveContent()">Save content</button>
      <p id="adminStatus" class="muted"></p>
    </div>
  </div>

  <script>
    function saveContent() {
      const payload = {
        pageTitle: document.getElementById('pageTitle').value,
        heroHeadline: document.getElementById('heroHeadline').value,
        heroText: document.getElementById('heroText').value,
        aboutText: document.getElementById('aboutText').value,
        featuredTestimonial: document.getElementById('featuredTestimonial').value,
        featuredAuthor: document.getElementById('featuredAuthor').value,
        testimonialOne: document.getElementById('testimonialOne').value,
        testimonialOneAuthor: document.getElementById('testimonialOneAuthor').value,
        testimonialTwo: document.getElementById('testimonialTwo').value,
        testimonialTwoAuthor: document.getElementById('testimonialTwoAuthor').value
      };
      localStorage.setItem('erinUkenAdminContent', JSON.stringify(payload));
      document.getElementById('adminStatus').textContent = 'Saved locally. Connect this to Supabase or your CMS later for cloud-based editing.';
    }

    window.addEventListener('DOMContentLoaded', function () {
      const saved = localStorage.getItem('erinUkenAdminContent');
      if (saved) {
        const parsed = JSON.parse(saved);
        document.getElementById('pageTitle').value = parsed.pageTitle || '';
        document.getElementById('heroHeadline').value = parsed.heroHeadline || '';
        document.getElementById('heroText').value = parsed.heroText || '';
        document.getElementById('aboutText').value = parsed.aboutText || '';
        document.getElementById('featuredTestimonial').value = parsed.featuredTestimonial || '';
        document.getElementById('featuredAuthor').value = parsed.featuredAuthor || '';
        document.getElementById('testimonialOne').value = parsed.testimonialOne || '';
        document.getElementById('testimonialOneAuthor').value = parsed.testimonialOneAuthor || '';
        document.getElementById('testimonialTwo').value = parsed.testimonialTwo || '';
        document.getElementById('testimonialTwoAuthor').value = parsed.testimonialTwoAuthor || '';
      }
    });
  </script>
</body>
</html>
